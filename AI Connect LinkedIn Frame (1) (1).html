  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght: 600;\n  font-display: swap;\n  src: url(\"122775b5-5e48-453c-9441-2e972cd798fe\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"71d4b1f4-0ac9-40c9-8b47-1cb2745e2042\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<script src=\"b18f73f7-3c0a-4d17-8d4a-a74e847e19b7\"><\u002Fscript>\n\n<style>\n  *{box-sizing:border-box;}\n  .grad-text{background:linear-gradient(110deg,#007AFF 0%,#9D4EDD 52%,#E9499F 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}\n  html,body{margin:0;padding:0;background:#d8dde3;}\n  input::placeholder{color:#b0bac0;}\n  input:focus{outline:none;border-color:#007AFF !important;box-shadow:0 0 0 3px rgba(0,122,255,.12) !important;}\n  button{transition:opacity .12s,transform .1s;}\n  button:hover{opacity:.9;}\n  button:active{opacity:.8;transform:translateY(0.5px);}\n  @media(max-width:660px){\n    .ctrl-card{flex-direction:column !important;gap:16px !important;padding:20px !important;}\n    .ctrl-div-v{display:none !important;}\n    .ctrl-step{flex:none !important;width:100% !important;min-width:0 !important;}\n    .ctrl-dl{flex-direction:row !important;align-items:center !important;width:100% !important;}\n    .ctrl-dl button{flex:1 !important;min-width:0 !important;}\n    .photo-tip{display:none !important;}\n  }\n  @media print{\n    body>*{display:none !important;}\n    #li-share-frame{display:flex !important;position:fixed !important;inset:0 !important;width:100vw !important;height:100vh !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px 72px;gap:20px;background:#d8dde3;font-family:'Hanken Grotesk',sans-serif;\">\n\n  <!-- header -->\n  <div style=\"text-align:center;\">\n    <img src=\"83aad780-9a97-4bcb-8fe1-93086a2e7931\" alt=\"AI Connect Keralam\" style=\"height:50px;width:auto;display:block;margin:0 auto 12px;\">\n    <p style=\"margin:0;font:500 14px/1.5 'Hanken Grotesk',sans-serif;color:#5a6a70;\">Fill in the steps below, then click <strong>Download PNG<\u002Fstrong> to save your LinkedIn frame<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- controls card -->\n  <div class=\"ctrl-card\" style=\"max-width:900px;width:100%;background:#fff;border-radius:20px;box-shadow:0 4px 28px -8px rgba(6,33,39,.18);padding:22px 30px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n\n    <!-- step 1: name -->\n    <div class=\"ctrl-step\" style=\"display:flex;align-items:center;gap:13px;flex:1;min-width:190px;\">\n      <div style=\"width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#007AFF,#9D4EDD);display:flex;align-items:center;justify-content:center;flex:none;\">\n        <span style=\"font:700 13px/1 'Hanken Grotesk',sans-serif;color:#fff;\">1<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font:700 11px/1 'Hanken Grotesk',sans-serif;letter-spacing:.13em;text-transform:uppercase;color:#9aa6a9;margin-bottom:8px;\">Your name<\u002Fdiv>\n        <input type=\"text\" placeholder=\"Enter your name…\" onchange=\"{{ handleName }}\" style=\"width:100%;border:1.5px solid #e0e8ee;border-radius:10px;padding:10px 13px;font:600 15px/1 'Hanken Grotesk',sans-serif;color:#062127;background:#f8fafc;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ctrl-div-v\" style=\"width:1px;height:54px;background:#eaeef2;flex:none;\"><\u002Fdiv>\n\n    <!-- step 2: download -->\n    <div class=\"ctrl-dl\" style=\"display:flex;flex-direction:column;align-items:center;gap:10px;flex:none;\">\n      <div style=\"width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#9D4EDD,#E9499F);display:flex;align-items:center;justify-content:center;\">\n        <span style=\"font:700 13px/1 'Hanken Grotesk',sans-serif;color:#fff;\">2<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ downloadFrame }}\" style=\"background:linear-gradient(110deg,#007AFF,#9D4EDD,#E9499F);border:none;border-radius:12px;padding:13px 22px;font:700 14px/1 'Hanken Grotesk',sans-serif;color:#fff;cursor:pointer;box-shadow:0 8px 20px -8px rgba(0,122,255,.45);white-space:nowrap;min-width:148px;text-align:center;\">{{ downloadLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- photo tip -->\n  <div class=\"photo-tip\" style=\"font:500 13px/1 'Hanken Grotesk',sans-serif;color:#8a9aa0;display:flex;align-items:center;gap:7px;\">\n    <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n    Click the circle below (or drag your photo onto it) to add your photo\n  <\u002Fdiv><div style=\"width:100%;display:flex;justify-content:center;overflow:hidden;\">\n    <div id=\"frame-scaler\" style=\"width:1080px;transform-origin:top center;flex:none;\">\n\n      <!-- ===== 1080×1080 FRAME ===== -->\n      <div id=\"li-share-frame\" style=\"width:1080px;height:1080px;background:#f1f4f8;position:relative;overflow:hidden;display:flex;flex-direction:column;font-family:'Hanken Grotesk',sans-serif;\">\n\n        <!-- background -->\n        <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,#eef3fb 0%,#f3f5f9 46%,#f1f4f8 100%);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(20,60,110,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(20,60,110,.06) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(120% 90% at 50% 38%,#000 55%,transparent 100%);-webkit-mask-image:radial-gradient(120% 90% at 50% 38%,#000 55%,transparent 100%);\"><\u002Fdiv>\n        <div style=\"position:absolute;width:560px;height:560px;left:-180px;top:120px;border-radius:50%;background:radial-gradient(circle,#007AFF,transparent 70%);opacity:.08;filter:blur(20px);\"><\u002Fdiv>\n        <div style=\"position:absolute;width:560px;height:560px;right:-180px;top:60px;border-radius:50%;background:radial-gradient(circle,#E9499F,transparent 70%);opacity:.08;filter:blur(24px);\"><\u002Fdiv>\n        <svg width=\"130\" height=\"130\" viewBox=\"0 0 24 24\" style=\"position:absolute;right:54px;top:250px;opacity:.16;\" fill=\"none\" stroke=\"#007AFF\" stroke-width=\"1\"><path d=\"M12 0c1.1 7.3 3.6 9.8 12 12-8.4 2.2-10.9 4.7-12 12-1.1-7.3-3.6-9.8-12-12 8.4-2.2 10.9-4.7 12-12Z\"><\u002Fpath><\u002Fsvg>\n        <svg width=\"84\" height=\"84\" viewBox=\"0 0 24 24\" style=\"position:absolute;left:48px;top:470px;opacity:.16;\" fill=\"none\" stroke=\"#9D4EDD\" stroke-width=\"1.1\"><path d=\"M12 0c1.1 7.3 3.6 9.8 12 12-8.4 2.2-10.9 4.7-12 12-1.1-7.3-3.6-9.8-12-12 8.4-2.2 10.9-4.7 12-12Z\"><\u002Fpath><\u002Fsvg>\n        <svg width=\"56\" height=\"56\" viewBox=\"0 0 24 24\" style=\"position:absolute;right:110px;top:640px;opacity:.18;\" fill=\"none\" stroke=\"#E9499F\" stroke-width=\"1.4\"><path d=\"M12 0c1.1 7.3 3.6 9.8 12 12-8.4 2.2-10.9 4.7-12 12-1.1-7.3-3.6-9.8-12-12 8.4-2.2 10.9-4.7 12-12Z\"><\u002Fpath><\u002Fsvg>\n\n        <!-- top bar -->\n        <div style=\"flex:none;height:9px;background:linear-gradient(90deg,#007AFF,#9D4EDD,#E9499F);position:relative;z-index:3;\"><\u002Fdiv>\n\n        <!-- content -->\n        <div style=\"position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:40px 64px 0;\">\n\n          <!-- header row -->\n          \n\n          <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px\">\n\n            <!-- event logo -->\n            \n\n            <!-- photo circle -->\n            <div style=\"position:relative;width:392px;height:392px;flex:none;\">\n              <div style=\"position:absolute;inset:-22px;border-radius:50%;background:radial-gradient(circle at 50% 42%,rgba(0,122,255,.26),rgba(233,73,159,.14) 56%,transparent 72%);filter:blur(10px);\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:0;border-radius:50%;padding:9px;background:linear-gradient(150deg,#007AFF,#9D4EDD 52%,#E9499F);box-shadow:0 34px 64px -30px rgba(6,33,39,.5);\">\n                <div style=\"width:100%;height:100%;border-radius:50%;overflow:hidden;background:#f4f7fa;border:6px solid #fff;cursor:pointer;position:relative;\" onclick=\"{{ pickPhoto }}\" ondragover=\"{{ handleDragOver }}\" ondrop=\"{{ handleDrop }}\">\n                  {{ photoContent }}\n                <\u002Fdiv>\n                {{ removeBtn }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- role badge -->\n            <div style=\"margin-top:-26px;position:relative;z-index:4;display:flex;justify-content:center;\">\n              <div style=\"background:{{ badgeBg }};border-radius:999px;padding:17px 54px;box-shadow:0 22px 44px -20px rgba(6,33,39,.55);border:4px solid #fff;\">\n                <span style=\"font:800 50px/1 'Hanken Grotesk',sans-serif;color:#fff;letter-spacing:-.01em;\">{{ roleLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- name -->\n            <div style=\"text-align:center;margin-top:20px;\">\n              <h2 style=\"margin:0;font:800 46px/1 'Hanken Grotesk',sans-serif;letter-spacing:-.02em;color:#062127;white-space:nowrap;\">{{ displayName }}<\u002Fh2>\n              <div style=\"margin-top:12px;font:600 19px/1 'Hanken Grotesk',sans-serif;color:#6a7a7e;white-space:nowrap;\">I'll be there, will you?<\u002Fdiv>\n            <\u002Fdiv><div style=\"display:flex;align-items:center;gap:20px;margin-top:22px;width:520px;\">\n              <div style=\"flex:1;height:1px;background:linear-gradient(90deg,transparent,#cdd7e0);\"><\u002Fdiv>\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 0c1.1 7.3 3.6 9.8 12 12-8.4 2.2-10.9 4.7-12 12-1.1-7.3-3.6-9.8-12-12 8.4-2.2 10.9-4.7 12-12Z\" fill=\"#9D4EDD\"><\u002Fpath><\u002Fsvg>\n              <div style=\"flex:1;height:1px;background:linear-gradient(90deg,#cdd7e0,transparent);\"><\u002Fdiv>\n            <\u002Fdiv><div style=\"text-align: center; margin-bottom: 32px; top: -19px\">\n              <div style=\"font: 700 14px/1 'Hanken Grotesk',sans-serif; letter-spacing: .22em; text-transform: uppercase; color: #6e7b7a; margin-bottom: 15px; font-size: 20px; white-space: nowrap\">Proud to be part of<\u002Fdiv>\n              <img src=\"83aad780-9a97-4bcb-8fe1-93086a2e7931\" alt=\"AI Connect Keralam\" style=\"height:90px;width:auto;display:block;margin:0 auto;\">\n            <\u002Fdiv>\n\n            <!-- divider -->\n            \n\n            <!-- event logo moved to top -->\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- footer band -->\n        <div style=\"position:relative;z-index:2;flex:none;background:linear-gradient(90deg,#007AFF,#9D4EDD,#E9499F);padding:3px 0 0;\">\n          <div style=\"background:#fbfcfe;padding:26px 72px;display:flex;align-items:center;justify-content:space-between;\">\n            <div style=\"display:flex;align-items:center;gap:24px;\">\n              <div style=\"display:flex;align-items:center;gap:13px;\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#007AFF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n                <div>\n                  <div style=\"font:800 21px/1 'Hanken Grotesk',sans-serif;color:#062127;\">June 27, 2026<\u002Fdiv>\n                  <div style=\"margin-top:6px;font:600 15px/1 'Hanken Grotesk',sans-serif;color:#6a7a7e;\">10 AM – 1 PM<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:44px;background:#d6dedd;\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:13px;\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E9499F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n                <div style=\"font:600 16px/1.3 'Hanken Grotesk',sans-serif;color:#3a4a4e;\">IOCOD Infotech, Govt. Cyberpark,<br>Sahya Building, Calicut<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;\">\n              <div style=\"font:700 12px/1 'Hanken Grotesk',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#9aa6a9;margin-bottom:9px;\">More info<\u002Fdiv>\n              <div style=\"font:800 23px/1 'Hanken Grotesk',sans-serif;\" class=\"grad-text\">www.aiconnectkeralam.in<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- bottom bar -->\n        <div style=\"flex:none;height:9px;background:linear-gradient(90deg,#E9499F,#9D4EDD,#007AFF);position:relative;z-index:3;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <!-- frame scaler outer -->\n  \n  <\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { role: 'Participant', name: '', photoUrl: null, downloading: false };\n\n  renderVals() {\n    const { role, name, photoUrl, downloading } = this.state;\n    const themes = {\n      Organizer:   'linear-gradient(110deg,#007AFF 0%,#9D4EDD 52%,#E9499F 100%)',\n      Participant: 'linear-gradient(115deg,#007AFF,#3C9CFF)',\n      Speaker:     'linear-gradient(120deg,#9D4EDD,#E9499F)',\n      Volunteer:   'linear-gradient(120deg,#E9499F,#FF7AB3)',\n      Mentor:      'linear-gradient(120deg,#007AFF,#9D4EDD)'\n    };\n    return {\n      displayName: name.trim() || 'Your Name',\n      roleLabel:   role,\n      badgeBg:     themes[role] || themes.Organizer,\n      photoContent: photoUrl\n        ? React.createElement('img', { src: photoUrl, style: { width:'100%', height:'100%', objectFit:'cover', objectPosition:'50% 18%', display:'block' }, alt:'Your photo' })\n        : React.createElement('div', { style: { width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'16px' } },\n            React.createElement('svg', { width:52, height:52, viewBox:'0 0 24 24', fill:'none', stroke:'#c4cdd4', strokeWidth:1.4, strokeLinecap:'round', strokeLinejoin:'round' },\n              React.createElement('rect', { x:3, y:3, width:18, height:18, rx:2 }),\n              React.createElement('circle', { cx:8.5, cy:8.5, r:1.5 }),\n              React.createElement('path', { d:'m21 15-5-5L5 21' })\n            ),\n            React.createElement('span', { style: { font:'600 17px/1.4 Hanken Grotesk,sans-serif', color:'#b8c4cc', textAlign:'center', padding:'0 44px' } }, 'Click or drop', React.createElement('br'), 'your photo here')\n          ),\n      removeBtn: photoUrl\n        ? React.createElement('button', {\n            'data-no-capture': '1',\n            onClick: (e) => { e.stopPropagation(); this.setState({ photoUrl: null }); try { localStorage.removeItem('ai-connect-photo'); } catch(_) {} },\n            title: 'Remove photo',\n            style: { position:'absolute', top:'16px', right:'16px', width:'40px', height:'40px', borderRadius:'50%', background:'rgba(6,33,39,.82)', border:'3px solid #fff', color:'#fff', fontSize:'22px', lineHeight:'1', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:20, boxShadow:'0 4px 14px rgba(0,0,0,.4)' }\n          }, '×')\n        : null,\n      downloadLabel: downloading ? 'Saving…' : 'Download PNG',\n      handleName: (e) => this.setState({ name: e.target.value }),\n      pickPhoto: () => {\n        const inp = document.createElement('input');\n        inp.type = 'file';\n        inp.accept = 'image/*';\n        inp.onchange = ev => {\n          const f = ev.target.files[0];\n          if (!f) return;\n          const reader = new FileReader();\n          reader.onload = e2 => {\n            const url = e2.target.result;\n            this.setState({ photoUrl: url });\n            try { localStorage.setItem('ai-connect-photo', url); } catch (_) {}\n          };\n          reader.readAsDataURL(f);\n        };\n        inp.click();\n      },\n      handleDrop: (e) => {\n        e.preventDefault();\n        const f = (e.dataTransfer.files || [])[0];\n        if (!f || !f.type.startsWith('image/')) return;\n        const reader = new FileReader();\n        reader.onload = ev => {\n          const url = ev.target.result;\n          this.setState({ photoUrl: url });\n          try { localStorage.setItem('ai-connect-photo', url); } catch (_) {}\n        };\n        reader.readAsDataURL(f);\n      },\n      handleDragOver: (e) => { e.preventDefault(); },\n      downloadFrame: async () => {\n        if (this.state.downloading) return;\n        this.setState({ downloading: true });\n        try {\n          const canvas = await this.renderToCanvas();\n          const a = document.createElement('a');\n          a.download = 'AI-Connect-Keralam-Frame.png';\n          a.href = canvas.toDataURL('image/png');\n          a.click();\n        } catch (err) {\n          console.error('Canvas render error:', err);\n          alert('Could not download. Please take a screenshot of the frame.');\n        }\n        this.setState({ downloading: false });\n      }\n    };\n  }\n\n  async renderToCanvas() {\n    const W = 1080, H = 1080, DPR = 2;\n    const canvas = document.createElement('canvas');\n    canvas.width = W * DPR; canvas.height = H * DPR;\n    const ctx = canvas.getContext('2d');\n    ctx.scale(DPR, DPR);\n    const { role, name, photoUrl } = this.state;\n    const displayName = name.trim() || 'Your Name';\n\n    const loadImg = src => new Promise(res => { const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = src; });\n    const logoEl = [...document.querySelectorAll('img[alt=\"AI Connect Keralam\"]')][0];\n    const [logoImg, photoImg] = await Promise.all([\n      logoEl ? loadImg(logoEl.src) : Promise.resolve(null),\n      photoUrl ? loadImg(photoUrl) : Promise.resolve(null)\n    ]);\n\n    const lgrad = (x0,y0,x1,y1,stops) => { const g=ctx.createLinearGradient(x0,y0,x1,y1); stops.forEach(([p,c])=>g.addColorStop(p,c)); return g; };\n    const brand = () => lgrad(0,0,W,0,[[0,'#007AFF'],[0.52,'#9D4EDD'],[1,'#E9499F']]);\n    const pill = (x,y,w,h) => { const r=h/2; ctx.beginPath(); ctx.arc(x+r,y+r,r,Math.PI*.5,Math.PI*1.5); ctx.arc(x+w-r,y+r,r,Math.PI*1.5,Math.PI*.5); ctx.closePath(); };\n\n    // Background\n    ctx.fillStyle = lgrad(0,0,0,H,[[0,'#eef3fb'],[0.46,'#f3f5f9'],[1,'#f1f4f8']]); ctx.fillRect(0,0,W,H);\n    ctx.save(); ctx.strokeStyle='rgba(20,60,110,.06)'; ctx.lineWidth=1;\n    for(let x=0;x<=W;x+=54){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}\n    for(let y=0;y<=H;y+=54){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}\n    ctx.restore();\n\n    // Top bar\n    ctx.fillStyle=brand(); ctx.fillRect(0,0,W,9);\n\n    // Logo top-left\n    if(logoImg){ const lh=56,lw=logoImg.width*lh/logoImg.height; ctx.drawImage(logoImg,64,40,lw,lh); }\n\n    // \"FIRST COMMUNITY MEETUP\" pill top-right\n    ctx.save(); ctx.font='700 13px \"Hanken Grotesk\",sans-serif'; ctx.textBaseline='middle';\n    const pt='FIRST COMMUNITY MEETUP', ptw=ctx.measureText(pt).width+54, px=W-64-ptw, py=40;\n    pill(px,py,ptw,42); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#d3deea'; ctx.lineWidth=1; ctx.stroke();\n    ctx.beginPath(); ctx.arc(px+22,py+21,4,0,Math.PI*2); ctx.fillStyle='#007AFF'; ctx.fill();\n    ctx.fillStyle='#3a4a4e'; ctx.textAlign='left'; ctx.fillText(pt,px+34,py+21); ctx.restore();\n\n    // PROUD TO BE PART OF + logo\n    let cy=120;\n    ctx.save(); ctx.font='700 20px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#6e7b7a'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';\n    ctx.fillText('PROUD TO BE PART OF',W/2,cy+26); cy+=46;\n    if(logoImg){ const bh=90,bw=logoImg.width*bh/logoImg.height; ctx.drawImage(logoImg,W/2-bw/2,cy,bw,bh); cy+=bh+20; }\n    ctx.restore();\n\n    // Photo circle\n    const cr=181, cx=W/2, photoY=cy+cr;\n    ctx.save();\n    const gl=ctx.createRadialGradient(cx,photoY,0,cx,photoY,cr+55);\n    gl.addColorStop(0,'rgba(0,122,255,.18)'); gl.addColorStop(0.5,'rgba(233,73,159,.08)'); gl.addColorStop(1,'transparent');\n    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(cx,photoY,cr+55,0,Math.PI*2); ctx.fill(); ctx.restore();\n    ctx.save();\n    const rg=lgrad(cx-cr-15,photoY-cr-15,cx+cr+15,photoY+cr+15,[[0,'#007AFF'],[0.52,'#9D4EDD'],[1,'#E9499F']]);\n    ctx.beginPath(); ctx.arc(cx,photoY,cr+15,0,Math.PI*2); ctx.fillStyle=rg; ctx.fill();\n    ctx.beginPath(); ctx.arc(cx,photoY,cr+6,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.restore();\n    ctx.save(); ctx.beginPath(); ctx.arc(cx,photoY,cr,0,Math.PI*2); ctx.clip();\n    if(photoImg){ const sc=Math.max(cr*2/photoImg.width,cr*2/photoImg.height),pw=photoImg.width*sc,ph=photoImg.height*sc; ctx.drawImage(photoImg,cx-pw/2,photoY-cr-(ph-cr*2)*.18,pw,ph); }\n    else{ ctx.fillStyle='#f4f7fa'; ctx.fillRect(cx-cr,photoY-cr,cr*2,cr*2); ctx.fillStyle='#b8c4cc'; ctx.font='600 18px \"Hanken Grotesk\",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Click circle to add photo',cx,photoY); }\n    ctx.restore();\n    cy=photoY+cr;\n\n    // Badge\n    const themeMap={Participant:[[0,'#007AFF'],[1,'#3C9CFF']],Organizer:[[0,'#007AFF'],[0.52,'#9D4EDD'],[1,'#E9499F']],Speaker:[[0,'#9D4EDD'],[1,'#E9499F']],Volunteer:[[0,'#E9499F'],[1,'#FF7AB3']],Mentor:[[0,'#007AFF'],[1,'#9D4EDD']]};\n    ctx.font='800 50px \"Hanken Grotesk\",sans-serif'; ctx.textBaseline='alphabetic';\n    const bw=ctx.measureText(role).width+108,bh=84,bx=cx-bw/2,by=cy-26;\n    ctx.save(); ctx.shadowColor='rgba(6,33,39,.35)'; ctx.shadowBlur=24; ctx.shadowOffsetY=12;\n    pill(bx,by,bw,bh); ctx.fillStyle=lgrad(bx,by,bx+bw,by,themeMap[role]||themeMap.Participant); ctx.fill(); ctx.restore();\n    ctx.save(); ctx.strokeStyle='#fff'; ctx.lineWidth=4; pill(bx,by,bw,bh); ctx.stroke(); ctx.restore();\n    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(role,cx,by+bh/2);\n    cy=by+bh;\n\n    // Name\n    cy+=30; ctx.font='800 46px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#062127'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';\n    ctx.fillText(displayName,cx,cy+46); cy+=46;\n    ctx.font='600 19px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#6a7a7e'; ctx.fillText(\"I'll be there, will you?\",cx,cy+32); cy+=32;\n\n    // Divider + sparkle\n    cy+=26;\n    ctx.save();\n    let dg=ctx.createLinearGradient(cx-260,cy,cx-20,cy); dg.addColorStop(0,'transparent'); dg.addColorStop(1,'#cdd7e0');\n    ctx.strokeStyle=dg; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx-260,cy); ctx.lineTo(cx-20,cy); ctx.stroke();\n    dg=ctx.createLinearGradient(cx+20,cy,cx+260,cy); dg.addColorStop(0,'#cdd7e0'); dg.addColorStop(1,'transparent');\n    ctx.strokeStyle=dg; ctx.beginPath(); ctx.moveTo(cx+20,cy); ctx.lineTo(cx+260,cy); ctx.stroke();\n    ctx.fillStyle='#9D4EDD'; ctx.beginPath();\n    ctx.moveTo(cx,cy-11); ctx.bezierCurveTo(cx+2,cy-2,cx+2,cy-2,cx+11,cy); ctx.bezierCurveTo(cx+2,cy+2,cx+2,cy+2,cx,cy+11); ctx.bezierCurveTo(cx-2,cy+2,cx-2,cy+2,cx-11,cy); ctx.bezierCurveTo(cx-2,cy-2,cx-2,cy-2,cx,cy-11); ctx.fill();\n    ctx.restore();\n\n    // Footer\n    const fh=110,fy=H-fh-9;\n    ctx.fillStyle=brand(); ctx.fillRect(0,fy,W,3);\n    ctx.fillStyle='#fbfcfe'; ctx.fillRect(0,fy+3,W,fh);\n    const fm=fy+3+fh/2; ctx.textBaseline='middle';\n    ctx.save(); ctx.strokeStyle='#007AFF'; ctx.lineWidth=1.8;\n    const ci={x:72,y:fm-13,w:22,h:20}; ctx.strokeRect(ci.x,ci.y,ci.w,ci.h);\n    ctx.beginPath(); ctx.moveTo(ci.x+7,ci.y); ctx.lineTo(ci.x+7,ci.y-5); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(ci.x+15,ci.y); ctx.lineTo(ci.x+15,ci.y-5); ctx.stroke();\n    ctx.beginPath(); ctx.moveTo(ci.x,ci.y+7); ctx.lineTo(ci.x+ci.w,ci.y+7); ctx.stroke(); ctx.restore();\n    ctx.font='800 21px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#062127'; ctx.textAlign='left'; ctx.fillText('June 27, 2026',104,fm-8);\n    ctx.font='600 15px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#6a7a7e'; ctx.fillText('10 AM – 1 PM',104,fm+12);\n    ctx.save(); ctx.strokeStyle='#d6dedd'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(268,fm-22); ctx.lineTo(268,fm+22); ctx.stroke(); ctx.restore();\n    ctx.save(); ctx.strokeStyle='#E9499F'; ctx.lineWidth=1.8; ctx.beginPath(); ctx.arc(292,fm-8,8,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(292,fm); ctx.lineTo(292,fm+11); ctx.stroke(); ctx.restore();\n    ctx.font='600 15px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#3a4a4e'; ctx.fillText('Govt. Cyberpark, Sahya Building, Calicut',312,fm+2);\n    ctx.textAlign='right'; ctx.font='700 12px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#9aa6a9'; ctx.fillText('MORE INFO',W-64,fm-8);\n    ctx.font='800 22px \"Hanken Grotesk\",sans-serif'; ctx.fillStyle='#007AFF'; ctx.fillText('www.aiconnectkeralam.in',W-64,fm+12);\n\n    // Bottom bar\n    ctx.fillStyle=lgrad(0,0,W,0,[[0,'#E9499F'],[0.52,'#9D4EDD'],[1,'#007AFF']]); ctx.fillRect(0,H-9,W,9);\n    return canvas;\n  }\n\n  componentDidMount() {\n    try {\n      const saved = localStorage.getItem('ai-connect-photo');\n      if (saved) this.setState({ photoUrl: saved });\n    } catch (_) {}\n    this.updateScale();\n    window.addEventListener('resize', () => this.updateScale());\n  }\n\n  updateScale() {\n    const el = document.getElementById('frame-scaler');\n    if (!el) return;\n    const avail = Math.min(window.innerWidth - 40, 720);\n    const scale = Math.min(1, avail / 1080);\n    el.style.transform = `scale(${scale})`;\n    el.style.marginBottom = `${(scale - 1) * 1080}px`;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
