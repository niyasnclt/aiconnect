<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1877F2"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.1" r="0.5">
      <stop stop-color="#1877F2" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#1877F2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.95" r="0.5">
      <stop stop-color="#EC4899" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <g transform="translate(90, 86)">
    <path d="M0 64 L20 16 L40 64" stroke="url(#brand)" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
    <path d="M8 48 H32" stroke="url(#brand)" stroke-width="9" stroke-linecap="round"/>
    <path d="M64 16 V64" stroke="url(#brand)" stroke-width="9" stroke-linecap="round"/>
    <path d="M63 0c.7 6 1.5 6.8 7.5 7.5-6 .7-6.8 1.5-7.5 7.5-.7-6-1.5-6.8-7.5-7.5C61.5 6.8 62.3 6 63 0Z" fill="url(#brand)"/>
  </g>
  <text x="186" y="118" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">AI Connect</text>
  <text x="186" y="158" font-family="Arial, sans-serif" font-size="26" fill="#cbd5e1">Kerala</text>

  <!-- Headline -->
  <text x="90" y="330" font-family="Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Connecting AI Builders</text>
  <text x="90" y="420" font-family="Arial, sans-serif" font-size="78" font-weight="800" fill="url(#brand)">Across Kerala</text>

  <text x="90" y="490" font-family="Arial, sans-serif" font-size="30" fill="#94a3b8">Developers · Designers · Founders · Students · AI Enthusiasts</text>

  <!-- Pill -->
  <rect x="90" y="528" width="430" height="56" rx="28" fill="url(#brand)"/>
  <text x="305" y="563" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">aiconnectkerala.in</text>
